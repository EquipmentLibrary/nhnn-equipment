<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHNN Equipment Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
:root{
  /* new semantic palette */
  --ink:#14181f;--ink2:#1e2632;--paper:#eef1f5;--surface:#ffffff;
  --line:#dee3ea;--line2:#c6cdd8;
  --blue:#005EB8;--blue-d:#00396f;--blue-l:#4aa3e8;
  --text:#1b2330;--muted:#5d6b7e;--faint:#8b97a8;
  --green:#1f8a4c;--amber:#b45309;--sky:#0a6cb5;--violet:#6d28d9;--rose:#c2334d;
  --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  --disp:'Space Grotesk',var(--sans);
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  /* legacy aliases so existing inline styles still resolve */
  --s900:#14181f;--s700:#334155;--s500:#5d6b7e;--s400:#8b97a8;--s300:#cbd5e1;--s200:#e6ebf2;--s100:#eef1f5;--s50:#f7f9fb;
  --emerald:#1f8a4c;--nhs:#005EB8;--nhs-dark:#00396f;--sx:#6d28d9;--ring:0 0 0 3px rgba(0,94,184,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--paper);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px}
svg{display:block}

/* header */
header{background:var(--ink);color:#fff;position:sticky;top:0;z-index:30}
.hbar{display:flex;align-items:stretch;gap:18px;min-height:62px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;padding:11px 0}
.logo{height:34px;width:34px;border-radius:8px;background:var(--blue);display:grid;place-items:center;color:#fff;flex:0 0 auto}
.title{font-family:var(--disp);font-weight:700;letter-spacing:-.01em;font-size:15px;line-height:1}
.sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:5px;line-height:1}
nav{margin-left:auto;display:flex;align-items:stretch;gap:18px}
.tab{display:flex;align-items:center;gap:7px;border:0;background:transparent;color:rgba(255,255,255,.6);font-family:var(--disp);font-weight:500;font-size:13.5px;padding:0;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s}
.tab:hover{color:#fff}
.tab.active{color:#fff;border-bottom-color:var(--blue-l)}

/* manifest bar */
.manifest{background:var(--surface);border-bottom:1px solid var(--line)}
.mfrow{display:flex;flex-wrap:wrap;gap:0}
.mf{display:flex;flex-direction:column;gap:5px;padding:15px 24px 15px 0;margin-right:24px;border-right:1px solid var(--line)}
.mf:last-child{border-right:0;margin-right:0}
.mf .n{font-family:var(--mono);font-weight:600;font-size:23px;line-height:1;color:var(--ink);letter-spacing:-.02em}
.mf .l{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint)}
.mf .l.l-green{color:var(--green)}.mf .l.l-amber{color:var(--amber)}.mf .l.l-sky{color:var(--sky)}

main{padding:30px 0 72px}
.row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
h1{font-family:var(--disp);font-size:23px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin:0}

/* search */
.search{position:relative;max-width:300px;width:100%}
.search .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);display:flex}
.search input{width:100%;border:1px solid var(--line2);border-radius:9px;padding:10px 12px 10px 38px;font-size:14px;font-family:var(--sans);outline:none;background:var(--surface);color:var(--text)}
.search input:focus{border-color:var(--blue);box-shadow:var(--ring)}
.modalsearch{max-width:none;margin-bottom:10px}

/* grid + cards */
.grid{display:grid;gap:16px;grid-template-columns:1fr}
@media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:960px){.grid{grid-template-columns:1fr 1fr 1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--ink);transform:translateY(-2px)}
.cphoto{height:172px;width:100%;display:grid;place-items:center;position:relative;overflow:hidden;background:#fff;color:var(--blue);border-bottom:1px solid var(--line)}
.cphoto.empty{background:repeating-linear-gradient(45deg,#eef2f7,#eef2f7 11px,#e8edf3 11px,#e8edf3 22px);color:#9fb1c6}
.cphoto img{position:absolute;inset:10px;width:calc(100% - 20px);height:calc(100% - 20px);object-fit:contain;display:block}
.cnum{position:absolute;top:11px;left:11px;font-family:var(--mono);font-weight:700;font-size:15px;background:var(--ink);color:#fff;padding:4px 10px;border-radius:7px}
.sxtag{position:absolute;top:11px;right:11px}
.cbody{padding:14px 15px 6px;flex:1}
.mname{font-family:var(--disp);font-weight:600;color:var(--ink);font-size:16px;line-height:1.25;letter-spacing:-.01em}
.mmeta{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:6px;letter-spacing:.01em}
.avl{display:flex;align-items:baseline;gap:8px;margin-top:13px}
.avl .n{font-family:var(--mono);font-weight:600;font-size:22px;line-height:1}
.avl small{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.cbtns{display:flex;gap:8px;padding:13px 15px 15px;border-top:1px solid var(--line);margin-top:8px}
.focus{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:560px}
@media(min-width:560px){.focus{flex-direction:row}}
.focusphoto{width:100%;height:158px;position:relative;overflow:hidden;background:#fff;color:var(--blue);display:grid;place-items:center;flex:0 0 auto;border-bottom:1px solid var(--line)}
@media(min-width:560px){.focusphoto{width:180px;height:240px;border-bottom:0;border-right:1px solid var(--line)}}
.focusphoto img{position:absolute;inset:10px;width:calc(100% - 20px);height:calc(100% - 20px);object-fit:contain;display:block}
.focusphoto.empty{background:repeating-linear-gradient(45deg,#eef2f7,#eef2f7 11px,#e8edf3 11px,#e8edf3 22px);color:#9fb1c6}
.focusbody{padding:18px;flex:1;min-width:0}
.focusno{font-family:var(--mono);font-weight:700;font-size:26px;color:var(--ink);letter-spacing:-.01em;margin-top:4px}
.focusmodel{font-family:var(--disp);font-weight:600;color:var(--ink);font-size:15px;margin-top:5px}
.focusmodel .mono{color:var(--muted);font-size:13px;font-weight:600}
.focusmeta{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.focusact{display:flex;gap:9px;margin-top:17px;flex-wrap:wrap}
.focusact .btn-primary,.focusact .btn-return{flex:1;min-width:170px}

/* tags + chips */
.badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border-radius:6px;padding:4px 8px;border:1px solid}
.b-sx{border-color:#d9ccf7;background:#f4f0fe;color:var(--violet)}
.b-ready{border-color:#bcdcf3;background:#ebf5fc;color:var(--sky)}
.schip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;border-radius:6px;padding:4px 8px;border:1px solid;flex:0 0 auto}
.dot{height:6px;width:6px;border-radius:99px}
.s-Available{background:#eaf7f0;color:var(--green);border-color:#bfe6cf}.s-Available .dot{background:var(--green)}
.s-OnLoan{background:#fdf3e6;color:var(--amber);border-color:#f0d9b5}.s-OnLoan .dot{background:var(--amber)}
.s-Awaiting{background:#ebf5fc;color:var(--sky);border-color:#bcdcf3}.s-Awaiting .dot{background:var(--sky)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:9px;padding:10px 14px;font-size:13.5px;font-weight:600;font-family:var(--sans);cursor:pointer;border:1px solid transparent;transition:.13s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--blue);color:#fff;flex:1}
.btn-primary:hover{background:var(--blue-d)}
.btn-primary:disabled{background:#aeb8c5;cursor:not-allowed}
.btn-ghost{background:var(--surface);color:var(--text);border-color:var(--line2)}
.btn-ghost:hover{border-color:var(--ink)}
.btn-danger{background:var(--rose);color:#fff}
.btn-return{background:var(--amber);color:#fff}
.btn-return:hover{filter:brightness(1.07)}
.btn-return .mini{background:rgba(255,255,255,.24);color:#fff}
.loc{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11.5px;color:var(--muted);background:#eef2f7;border:1px solid var(--line);border-radius:7px;padding:4px 9px;flex:0 0 auto}
.loc svg{width:12px;height:12px}
.btn-sm{padding:8px 11px;font-size:13px}
.mini{font-family:var(--mono);margin-left:1px;border-radius:5px;background:rgba(180,83,9,.14);color:var(--amber);font-size:11px;font-weight:600;padding:1px 6px}

/* panels + lists */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.panel.pad{padding:18px}
.panel h2{font-family:var(--disp);font-size:15px;font-weight:600;color:var(--ink);margin:0 0 14px}
.mgrid{display:grid;gap:18px;grid-template-columns:1fr}@media(min-width:960px){.mgrid{grid-template-columns:340px 1fr}}
.lab{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:7px}
.field{margin-bottom:14px}.inline{display:flex;gap:9px}
.hint{font-size:11.5px;color:var(--faint);margin:7px 0 0;line-height:1.55}
.listhead{padding:13px;border-bottom:1px solid var(--line)}
.litem{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line)}
.litem:last-child{border-bottom:0}.litem:hover{background:#f7f9fb}
.mono{font-family:var(--mono)}
.thumb{height:44px;width:44px;border-radius:8px;background:#e7edf4;color:var(--blue);display:grid;place-items:center;flex:0 0 auto;overflow:hidden}
.thumb img{height:100%;width:100%;object-fit:cover}
.iconbtn{height:34px;width:34px;border:1px solid var(--line2);background:var(--surface);border-radius:8px;color:var(--muted);cursor:pointer;display:grid;place-items:center;flex:0 0 auto;transition:.12s}
.iconbtn:hover{border-color:var(--ink);color:var(--ink)}
.iconbtn.danger:hover{color:var(--rose);border-color:var(--rose)}

/* inputs + toggles */
select,.tinput{width:100%;border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:14px;font-family:var(--sans);outline:none;background:var(--surface);color:var(--text)}
select:focus,.tinput:focus{border-color:var(--blue);box-shadow:var(--ring)}
.tinput.mono{font-family:var(--mono)}
.toggle{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tg{border:1px solid var(--line2);background:var(--surface);border-radius:9px;padding:10px;font-weight:600;font-size:13.5px;color:var(--text);cursor:pointer;font-family:var(--sans);transition:.12s}
.tg.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.subtabs{display:inline-flex;background:#e4e9f0;border-radius:9px;padding:3px}
.subtab{padding:7px 13px;border-radius:7px;font-size:13.5px;font-weight:600;color:var(--muted);border:0;background:transparent;cursor:pointer;font-family:var(--sans)}
.subtab.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}

.empty{text-align:center;padding:54px 24px;color:var(--faint)}
.empty .circle{height:52px;width:52px;border-radius:10px;background:#e7edf4;display:grid;place-items:center;margin:0 auto 14px;color:var(--blue)}
.empty b{display:block;color:var(--text);font-family:var(--disp);font-weight:600;font-size:15px}
.demohint{font-family:var(--mono);text-align:center;color:var(--faint);font-size:11px;letter-spacing:.05em;margin-top:28px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,21,30,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:40;padding:16px;animation:fade .14s ease}
@media(max-width:600px){.overlay{align-items:flex-end;padding:0}}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:94vh;display:flex;flex-direction:column;border:1px solid var(--line);box-shadow:0 24px 60px -20px rgba(8,15,25,.5);animation:pop .18s cubic-bezier(.2,.8,.3,1.1)}
@media(max-width:600px){.modal{border-radius:14px 14px 0 0;max-width:none}}
.mhead{display:flex;align-items:center;gap:12px;padding:17px 19px;border-bottom:1px solid var(--line)}
.mhead .htitle{font-family:var(--disp);font-weight:600;color:var(--ink);font-size:16px}
.eyebrow{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--blue)}
.eyebrow2{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--blue)}
.x{margin-left:auto;height:32px;width:32px;border:1px solid var(--line);background:var(--surface);border-radius:8px;cursor:pointer;color:var(--muted);display:grid;place-items:center}
.x:hover{border-color:var(--ink);color:var(--ink)}
.mbody{overflow-y:auto;padding:18px 19px}
.step{display:flex;align-items:center;gap:9px;margin:18px 0 9px}.step:first-child{margin-top:0}
.step .num{height:24px;width:24px;border-radius:6px;background:var(--ink);color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;display:grid;place-items:center}
.step span{font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink)}
.pick{width:100%;text-align:left;border:1px solid var(--line);border-radius:9px;padding:11px 12px;background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;font-family:inherit;transition:.12s}
.pick:hover{border-color:var(--line2);background:#f7f9fb}
.pick.sel{border-color:var(--blue);background:#f0f7fd}
.radio{height:20px;width:20px;border-radius:6px;border:1.5px solid var(--line2);display:grid;place-items:center;flex:0 0 auto;color:#fff}
.pick.sel .radio{background:var(--blue);border-color:var(--blue)}
.pname{font-family:var(--mono);font-weight:600;color:var(--ink);font-size:13.5px}
.pmeta{font-size:12px;color:var(--muted)}
.notice{display:flex;gap:9px;border:1px solid #d9ccf7;background:#f5f1fe;color:#5b21b6;border-radius:9px;padding:11px 12px;font-size:13px;line-height:1.5;margin-bottom:4px}
.mfoot{padding:15px 19px;border-top:1px solid var(--line)}
.confirm{width:100%;border-radius:9px;padding:13px;font-weight:700;font-size:14px;color:#fff;background:var(--blue);border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans)}
.confirm:hover{background:var(--blue-d)}.confirm:disabled{background:#aeb8c5;cursor:not-allowed}
.photopick{display:flex;align-items:center;gap:11px}
.photoprev{height:46px;width:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line2)}
.lockwrap{max-width:360px;margin:64px auto;text-align:center}
.lockwrap .circle{height:54px;width:54px;border-radius:10px;background:var(--ink);color:#fff;display:grid;place-items:center;margin:0 auto 16px}
.confcircle{height:50px;width:50px;border-radius:10px;display:grid;place-items:center;margin:0 auto;background:#ebf5fc;color:var(--sky)}
.confcircle.danger{background:#fdeef0;color:var(--rose)}

/* A6 label preview */
.labtag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);text-align:center;margin:0 0 14px}
.labelwrap{display:grid;gap:16px;grid-template-columns:1fr 1fr}
@media(max-width:560px){.labelwrap{grid-template-columns:1fr}}
.a6{aspect-ratio:105/148;border:1px solid var(--line2);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;background:#fff}
.a6 .a6h{background:var(--ink);color:#fff;padding:11px 12px}
.a6 .a6lib{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:-.01em}
.a6 .a6dep{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:3px}
.a6 .a6body{flex:1;padding:13px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px}
.a6 .a6no{font-family:var(--mono);font-weight:600;font-size:32px;color:var(--ink);line-height:1}
.a6 .a6mn{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink)}
.a6 .a6qr{width:104px;height:104px}
.a6 .a6cap{font-size:10px;color:var(--muted);line-height:1.45}
.a6 .a6foot{font-family:var(--mono);font-size:8px;color:var(--faint);text-align:center;padding:9px;border-top:1px dashed var(--line2)}
.a6 .wline{border-bottom:1px solid var(--line2);height:20px;width:100%}
.a6 .wlab{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:-6px}

/* motion */
@keyframes pop{from{transform:translateY(12px) scale(.99);opacity:0}to{transform:none;opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.anim-in{animation:fadeUp .34s cubic-bezier(.2,.7,.3,1) both}
.stagger>.card{animation:fadeUp .42s cubic-bezier(.2,.7,.3,1) both}
.stagger>.card:nth-child(1){animation-delay:.03s}.stagger>.card:nth-child(2){animation-delay:.07s}
.stagger>.card:nth-child(3){animation-delay:.11s}.stagger>.card:nth-child(4){animation-delay:.15s}
.stagger>.card:nth-child(5){animation-delay:.19s}.stagger>.card:nth-child(6){animation-delay:.23s}
.stagger>.card:nth-child(7){animation-delay:.27s}.stagger>.card:nth-child(8){animation-delay:.31s}
.stagger>.card:nth-child(n+9){animation-delay:.34s}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.001s!important}}

/* toast */
.toast{position:fixed;left:0;right:0;bottom:22px;display:flex;justify-content:center;padding:0 16px;z-index:60;pointer-events:none}
.toastbox{pointer-events:auto;display:flex;gap:10px;align-items:flex-start;background:var(--ink);color:#fff;border-radius:10px;padding:12px 15px;font-size:13.5px;max-width:460px;box-shadow:0 16px 40px -14px rgba(0,0,0,.55);line-height:1.4;animation:pop .2s ease}
.toastbox.sx{background:var(--violet)}.toastbox.err{background:var(--rose)}
.toastbox svg{flex:0 0 auto;margin-top:1px}

</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="confirm-root"></div>
<div id="toast-root"></div>
<input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none">

<script>
/* ---------------- backend config ---------------- */
const CONFIG={API_URL:"https://script.google.com/macros/s/AKfycbwMgfoW2BqD35nHQYTc__2slkvTUlYKRCyc30lN7I5gVTTfUk7j2UYQtqvN4eEljEM5/exec"};   // live: reads/writes the Google Sheet
const DEMO=!CONFIG.API_URL;

/* ---------------- icons ---------------- */
const I={

const WARDS=["Bernard Sunley","David Ferrier","Victor Horsley","Nuffield","Chandler","Molly Lane Fox","ITU","Theatres Recovery","Lysholm","Day Care"];
function seedData(){
  const models=[
    {id:"m1",name:"Alaris GP infusion pump",type:"Infusion pump",ref:"INF-01",category:"Standard",photo:""},
    {id:"m2",name:"Alaris syringe driver",type:"Syringe driver",ref:"SYR-02",category:"Standard",photo:""},
    {id:"m3",name:"Philips patient monitor",type:"Patient monitor",ref:"MON-03",category:"Standard",photo:""},
    {id:"m4",name:"Portable suction unit",type:"Suction unit",ref:"SUC-04",category:"Standard",photo:""},
    {id:"m5",name:"Nebuliser unit",type:"Nebuliser",ref:"NEB-05",category:"Standard",photo:""},
    {id:"m6",name:"Bladder scanner",type:"Bladder scanner",ref:"BLD-06",category:"Service Exchange",photo:""},
  ];
  models.forEach((m,i)=>{m.number=i+1;});
  const counts={m1:6,m2:4,m3:3,m4:4,m5:3,m6:2}; const assets=[]; let n=10001;
  models.forEach(m=>{for(let i=0;i<counts[m.id];i++)assets.push({assetNumber:"A-"+String(n++).padStart(5,"0"),model:m.name,status:"Available",location:"Equipment Library",owningWard:"",decontaminated:false,collectionLocation:""});});
  const loans=[];
  function sl(an,ward,status,days,ready){const a=assets.find(x=>x.assetNumber===an);if(!a)return;a.status=status;a.location=ward;if(ready){a.decontaminated=true;a.collectionLocation=ward+" — clean utility";}
    loans.push({id:"L-"+an,assetNumber:an,model:a.model,ward,loanType:"Standard",handledByRole:"Porter",note:"",loanedAt:Date.now()-days*864e5,returnedAt:null,collectionReadyAt:ready?Date.now()-36e5:null,collectionLocation:ready?ward+" — clean utility":"",decontaminated:!!ready});}
  sl("A-10001","Victor Horsley","On Loan",2,false);
  sl("A-10002","ITU","Awaiting Collection",4,true);
  sl("A-10011","Nuffield","On Loan",1,false);
  return {models,assets,loans};
}

function resizeImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=560,sc=Math.min(1,max/Math.max(img.width,img.height));const cv=document.createElement("canvas");cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);cb(cv.toDataURL("image/jpeg",.72));};img.src=r.result;};r.readAsDataURL(file);}

/* ---------------- backend API ---------------- */
async function apiGet(){const r=await fetch(CONFIG.API_URL+"?action=data&t="+Date.now());return await r.json();}
async function persist(action,payload){
  if(DEMO)return;
  try{
    const r=await fetch(CONFIG.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(Object.assign({action},payload))});
    const j=await r.json(); if(j&&j.ok&&j.data){data=j.data;render();return;}
  }catch(e){}
    try{data=await apiGet();render();}catch(e){}
}
async function boot(){
  if(DEMO){data=seedData();render();return;}
  document.getElementById("app").innerHTML='<div style="padding:64px;text-align:center;color:#5d6b7e;font-family:system-ui">Loading the library…</div>';
  try{data=await apiGet();}catch(e){data={models:[],assets:[],loans:[]};}
  render();
}

function assetFocusHTML(asset){
  const model=data.models.find(m=>m.name===asset.model)||{id:"",number:0,photo:""};

  if(st==="Available")action=`<button class="btn btn-primary" onclick="openModal('loan','${model.id}','${esc(asset.assetNumber)}')">${I.plus} Loan this device</button>`;
  else if(st==="On Loan"){const loan=data.loans.find(l=>l.assetNumber===asset.assetNumber&&!l.returnedAt);action=loan?`<button class="btn btn-return" onclick="openModal('return','${model.id}','${loan.id}')">${I.back} Return this device</button>`:"";}
  else if(st==="Awaiting Collection")action=`<button class="btn btn-return" onclick="collectReturn('${esc(asset.assetNumber)}')">${I.collect} Collected &amp; return</button>`;
  return `<div class="focus">
    <div class="focusphoto ${model.photo?"":"empty"}">${model.photo?`<img src="${model.photo}" alt="">`:I.deviceBig}<span class="cnum">#${p2(model.number||0)}</span></div>

}

/* ---------------- Excel / CSV import-export ---------------- */
function field(o,names){for(const k in o){const kk=k.toLowerCase().replace(/[^a-z]/g,"");if(names.indexOf(kk)>=0)return String(o[k]==null?"":o[k]).trim();}return "";}
function parseCSV(text){const rows=[];let i=0,f="",row=[],q=false;while(i<text.length){const c=text[i];
  if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
  else{if(c==='"')q=true;else if(c===','){row.push(f);f="";}else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;row.push(f);rows.push(row);row=[];f="";}else f+=c;}i++;}
  if(f!==""||row.length){row.push(f);rows.push(row);}return rows;}
function rowsToObjs(rows){if(!rows.length)return[];const head=rows[0].map(h=>String(h).trim());return rows.slice(1).filter(r=>r.join("").trim()).map(r=>{const o={};head.forEach((h,i)=>o[h]=r[i]);return o;});}
function processImport(objs){
  let addM=0,addA=0,skip=0;
  objs.forEach(o=>{
    const mn=field(o,["model","modelname"]);if(!mn)return;
    let model=data.models.find(m=>m.name.toLowerCase()===mn.toLowerCase());
    if(!model){const cat=field(o,["category","loancategory","cat"]);model={id:"m"+Date.now()+Math.floor(Math.random()*1e4),number:nextModelNumber(),name:mn,type:field(o,["type","devicetype"]),ref:field(o,["ref","reference"])||"—",category:/serv|exch/i.test(cat)?"Service Exchange":"Standard",photo:""};data.models.push(model);addM++;}
    const an=field(o,["assetnumber","asset","label","assetlabel","number"]);
    if(an){if(data.assets.some(a=>a.assetNumber.toLowerCase()===an.toLowerCase()))skip++;else{data.assets.push({assetNumber:an,model:model.name,status:"Available",location:"Equipment Library",owningWard:"",decontaminated:false,collectionLocation:""});addA++;}}
  });
  toast(`Imported ${addA} device(s), ${addM} new model(s)`+(skip?`, ${skip} duplicate(s) skipped.`:"."));persist("replaceAll",{models:data.models,assets:data.assets});render();
}
function handleImport(file){
  const name=(file.name||"").toLowerCase(),r=new FileReader();
  if(name.endsWith(".csv")){r.onload=()=>{try{processImport(rowsToObjs(parseCSV(r.result)));}catch(e){toast("Couldn't read that CSV.","err");}};r.readAsText(file);}
  else{if(typeof XLSX==="undefined"){toast("Excel reading isn't available here — save the file as CSV, or use the deployed app.","err");return;}
    r.onload=()=>{try{const wb=XLSX.read(r.result,{type:"array"});const objs=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});processImport(objs);}catch(e){toast("Couldn't read that spreadsheet.","err");}};r.readAsArrayBuffer(file);}
}
function csvCell(v){v=String(v==null?"":v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadCSV(fn,rows){const csv=rows.map(r=>r.map(csvCell).join(",")).join("\n");const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u);}
function downloadTemplate(){
  const head=["AssetNumber","Model","Type","Ref","Category"];
  const ex=[["A-10101","Alaris GP infusion pump","Infusion pump","INF-01","Standard"],["A-10102","Alaris GP infusion pump","Infusion pump","INF-01","Standard"],["B-2001","Bladder scanner","Bladder scanner","BLD-06","Service Exchange"]];
  if(typeof XLSX!=="undefined"){const ws=XLSX.utils.aoa_to_sheet([head,...ex]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Equipment");XLSX.writeFile(wb,"equipment-template.xlsx");}
  else downloadCSV("equipment-template.csv",[head,...ex]);
  toast("Template downloaded.");
}
function exportData(){
  const rows=[["AssetNumber","Model","Type","Ref","Category","Status","Location"]];
  data.assets.forEach(a=>{const m=data.models.find(x=>x.name===a.model)||{};rows.push([a.assetNumber,a.model,m.type||"",m.ref||"",m.category||"",a.status,a.location]);});
  if(typeof XLSX!=="undefined"){const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Equipment");XLSX.writeFile(wb,"equipment-library.xlsx");}
  else downloadCSV("equipment-library.csv",rows);
  toast("Exported current stock.");
}

/* ---------------- nav + misc ---------------- */
function setTab(t){tab=t;anim=true;render();}
function setSub(s){manageSub=s;mgQuery="";anim=true;render();}
function emptyHTML(icon,title,hint){return `<div class="empty"><div class="circle">${icon}</div><b>${esc(title)}</b><div style="font-size:14px;margin-top:5px">${esc(hint)}</div></div>`;}

/* ---------------- A6 asset label (QR + manual, double-sided) ---------------- */
function qrSrc(text){if(typeof qrcode==="undefined")return "";try{const q=qrcode(0,"M");q.addData(text);q.make();return q.createDataURL(6,6);}catch(e){return "";}}
function assetURL(an){return BASE_URL+"#return?a="+encodeURIComponent(an);}
function openAssetLabel(an){
  const asset=data.assets.find(a=>a.assetNumber===an);if(!asset)return;
  const model=data.models.find(m=>m.name===asset.model)||{number:0,name:asset.model,type:""};
  const qr=qrSrc(assetURL(an));
  document.getElementById("modal-root").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:660px">
    <div class="mhead"><div><div class="eyebrow2">A6 LABEL \u00b7 ${esc(an)}</div><div class="htitle">${esc(asset.model)}</div></div>
      <button class="x" onclick="closeModal()">${I.x}</button></div>
    <div class="mbody"><p class="labtag">One label per device \u2014 the QR carries this asset number, so scanning opens its details and the return &amp; decontamination form.</p>
      <div class="labelwrap">${labelFront(asset,model,qr)}${labelBack(asset,model)}</div></div>
    <div class="mfoot"><button class="confirm" onclick="printAssetLabel('${esc(an)}')">${I.print} Print A6 (double-sided)</button></div>
  </div></div>`;
}
function labelFront(asset,model,qr){
  return `<div class="a6"><div class="a6h"><div class="a6lib">NHNN Equipment Library</div><div class="a6dep">Biomedical Engineering \u00b7 Model #${p2(model.number||0)}</div></div>
    <div class="a6body"><div class="a6no">${esc(asset.assetNumber)}</div><div class="a6mn">${esc(asset.model)}</div>
      ${qr?`<img class="a6qr" src="${qr}" alt="QR">`:`<div class="a6qr" style="border:1px dashed var(--line2);display:grid;place-items:center;font-size:9px;color:var(--faint)">QR loads<br>when deployed</div>`}
      <div class="a6cap">Finished with this device?<br>Scan for its details and to log <b>return</b> &amp; <b>decontamination</b>.</div></div>
    <div class="a6foot">No phone? Use the slip on the back \u00b7 ext. 74321</div></div>`;
}
function labelBack(asset,model){
  const line=l=>`<div><span class="wlab">${l}</span><div class="wline"></div></div>`;
  return `<div class="a6"><div class="a6h"><div class="a6lib">Return &amp; decontamination</div><div class="a6dep">${esc(asset.assetNumber)} \u00b7 ${esc(asset.model)}</div></div>
    <div class="a6body" style="align-items:stretch;text-align:left;gap:13px">
      <div><span class="wlab">Ready for collection?</span><div style="font-family:var(--mono);font-size:11px;margin-top:5px">\u2610 Yes&nbsp;&nbsp;&nbsp;\u2610 No</div></div>
      <div><span class="wlab">Decontaminated?</span><div style="font-family:var(--mono);font-size:11px;margin-top:5px">\u2610 Yes&nbsp;&nbsp;&nbsp;\u2610 No</div></div>
      ${line("Signed off by (nurse)")}
      ${line("Date")}</div>
    <div class="a6foot">Hand this slip to the Equipment Library \u00b7 ext. 74321</div></div>`;
}
function printAssetLabel(an){
  const asset=data.assets.find(a=>a.assetNumber===an);if(!asset)return;
  const model=data.models.find(m=>m.name===asset.model)||{number:0,type:""};
  const qr=qrSrc(assetURL(an));
  const css="@page{size:A6;margin:0}*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}body{margin:0}.pg{width:105mm;height:148mm;display:flex;flex-direction:column;page-break-after:always;overflow:hidden}.h{background:#14181f;color:#fff;padding:8mm 7mm 6mm}.lib{font-size:15pt;font-weight:800}.dep{font-size:8pt;letter-spacing:1.4px;text-transform:uppercase;color:#b9c2cf;margin-top:2mm}.b{flex:1;padding:7mm;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4mm}.no{font-size:26pt;font-weight:800;font-family:monospace}.mn{font-size:12pt;font-weight:700}.qr{width:46mm;height:46mm}.cap{font-size:9pt;color:#444;line-height:1.4}.foot{font-size:7.5pt;color:#888;text-align:center;padding:5mm;border-top:1px dashed #aaa}.bl{text-align:left;padding:7mm;display:flex;flex-direction:column;gap:6mm}.ln{border-bottom:1px solid #444;height:9mm}.lb{font-size:7.5pt;letter-spacing:1px;text-transform:uppercase;color:#666}";
  const front=`<div class="pg"><div class="h"><div class="lib">NHNN Equipment Library</div><div class="dep">Biomedical Engineering &middot; Model #${p2(model.number||0)}</div></div><div class="b"><div class="no">${esc(asset.assetNumber)}</div><div class="mn">${esc(asset.model)}</div>${qr?`<img class="qr" src="${qr}">`:""}<div class="cap">Finished with this device?<br>Scan for its details and to log return &amp; decontamination.</div></div><div class="foot">No phone? Use the slip on the back &middot; ext. 74321</div></div>`;
  const back=`<div class="pg"><div class="h"><div class="lib">Return &amp; decontamination</div><div class="dep">${esc(asset.assetNumber)} &middot; ${esc(asset.model)}</div></div><div class="bl"><div><div class="lb">Ready for collection?</div><div style="font-size:11pt;margin-top:2mm">&#9744; Yes&nbsp;&nbsp;&nbsp;&#9744; No</div></div><div><div class="lb">Decontaminated?</div><div style="font-size:11pt;margin-top:2mm">&#9744; Yes&nbsp;&nbsp;&nbsp;&#9744; No</div></div><div><div class="lb">Signed off by (nurse)</div><div class="ln"></div></div><div><div class="lb">Date</div><div class="ln"></div></div></div><div class="foot">Hand this slip to the Equipment Library &middot; ext. 74321</div></div>`;
  const doc="<!doctype html><html><head><meta charset='utf-8'><title>A6 "+esc(an)+"</title><style>"+css+"</style></head><body>"+front+back+"<script>window.onload=function(){setTimeout(function(){window.print();},300);}<\/script></body></html>";
  try{const w=window.open("","_blank");if(!w){toast("Allow pop-ups to print, or print from the deployed site.","err");return;}w.document.open();w.document.write(doc);w.document.close();}catch(e){toast("Print view is blocked here, works once deployed.","err");}
}

document.getElementById("importFile").addEventListener("change",e=>{const f=e.target.files[0];if(f)handleImport(f);e.target.value="";});
boot();
</script>
